name: iko
description: "IKO — A gamified operating system for your real life. Turn habits and goals into quests, level up, and master your days."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.3.0
  dio: ^5.9.2
  flutter_secure_storage: ^10.3.1
  flutter_animate: ^4.5.2
  firebase_core: ^4.10.0
  firebase_analytics: ^12.4.2
  image_picker: ^1.2.2
  path_provider: ^2.1.5
  path: ^1.9.0
  # Premium UI / Local features
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
